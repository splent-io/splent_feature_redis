# ── Feature Contract (auto-generated by splent feature:release) ───────────────
# Do not edit manually — re-run `splent feature:release` to refresh.
[tool.splent.contract]
description = "Redis integration: configures Redis-backed sessions via inject_config"

[tool.splent.contract.provides]
routes     = []
blueprints = ["redis_bp"]
models     = []
commands   = []
hooks      = []
services   = []
docker     = []

[tool.splent.contract.requires]
features = []
env_vars = ["REDIS_URL"]

[tool.splent.contract.extensible]
services  = []
templates = []
models    = []
hooks     = []
routes    = false
